<script>
const entries = JSON.parse(document.getElementById('wire-data').textContent);
const feed = document.getElementById('feed');
const filters = document.getElementById('filters');
const search = document.getElementById('search');
const visibleCount = document.getElementById('visibleCount');
const totalCount = document.getElementById('totalCount');
const empty = document.getElementById('empty');
let activeTag = 'all';

function esc(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function tagCounts() {
  const counts = new Map();
  entries.forEach(entry => (entry.tags || []).forEach(tag => counts.set(tag, (counts.get(tag) || 0) + 1)));
  return Array.from(counts.entries()).sort((a,b) => b[1] - a[1] || a[0].localeCompare(b[0]));
}

function renderFilters() {
  const topTags = tagCounts().slice(0, 40);
  filters.innerHTML = `<button class="filter active" data-tag="all">All</button>` + topTags.map(([tag,count]) =>
    `<button class="filter" data-tag="${esc(tag)}">${esc(tag)} <span class="small">${count}</span></button>`
  ).join('');
  filters.querySelectorAll('.filter').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTag = btn.dataset.tag;
      filters.querySelectorAll('.filter').forEach(b => b.classList.toggle('active', b === btn));
      renderFeed();
    });
  });
}

function matches(entry) {
  const q = search.value.trim().toLowerCase();
  const tagOk = activeTag === 'all' || (entry.tags || []).includes(activeTag);
  if (!tagOk) return false;
  if (!q) return true;
  const haystack = [entry.title, entry.summary, entry.author, entry.posted, ...(entry.labels || []), ...(entry.tags || [])].join(' ').toLowerCase();
  return haystack.includes(q);
}

function renderCard(entry) {
  const labels = (entry.labels || []).map(label => `<span class="label">${esc(label)}</span>`).join('');
  const tags = (entry.tags || []).map(tag => `<button class="tag" data-tag="${esc(tag)}">${esc(tag)}</button>`).join('');
  return `<article class="card">
    <div class="meta">${labels}<span>Posted ${esc(entry.posted)}</span><span>${esc(entry.author)}</span></div>
    <h2>${esc(entry.title)}</h2>
    <p class="summary">${esc(entry.summary)}</p>
    <p><a href="${esc(entry.url)}" target="_blank" rel="noopener noreferrer">Source</a></p>
    <div class="tag-row">${tags}</div>
  </article>`;
}

function renderFeed() {
  const shown = entries.filter(matches);
  feed.innerHTML = shown.map(renderCard).join('');
  visibleCount.textContent = String(shown.length);
  totalCount.textContent = String(entries.length);
  empty.style.display = shown.length ? 'none' : 'block';
  feed.querySelectorAll('.tag').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTag = btn.dataset.tag;
      filters.querySelectorAll('.filter').forEach(b => b.classList.toggle('active', b.dataset.tag === activeTag));
      renderFeed();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}

search.addEventListener('input', renderFeed);
renderFilters();
renderFeed();
</script>
