<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Wire — Knowledge Hub Magazine</title>
  <style>
    :root { --bg:#f7f7f5; --paper:#fff; --ink:#1f1f1f; --muted:#666; --line:#ddd; }
    body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:var(--bg);color:var(--ink)}
    header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:18px 28px;background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}
    .brand{font-weight:700;letter-spacing:-.02em} nav{justify-self:end;display:flex;gap:16px} nav a{color:#222;text-decoration:none}
    main{max-width:1120px;margin:0 auto;padding:44px 28px}.eyebrow{color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-size:12px}
    h1{font-size:clamp(38px,6vw,76px);letter-spacing:-.06em;line-height:.95;margin:10px 0 16px}.deck{max-width:780px;color:#444;font-size:19px;line-height:1.55}
    .toolbar{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px;margin:26px 0 22px}.toolbar-top{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}.toolbar-title{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px}.filter-row{display:flex;flex-wrap:wrap;gap:8px}
    .filter,.tag{display:inline-block;padding:4px 9px;border:1px solid var(--line);border-radius:999px;font-size:12px;color:#555;background:#fff;cursor:pointer}.filter:hover,.tag:hover,.filter.active{border-color:#222;color:#111}
    .search{width:min(420px,70vw);padding:10px 12px;border:1px solid #ccc;border-radius:999px}.count{color:var(--muted);font-size:13px;margin-top:10px}.feed{margin-top:20px}
    .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:14px}.meta{color:var(--muted);font-size:13px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}.label{display:inline-block;padding:3px 8px;border:1px solid #d8d8d8;border-radius:999px;background:#f2f2ef;color:#555;font-size:12px}.summary{line-height:1.55}.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}a{color:#0756a5;text-decoration:none}.empty{display:none;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:20px;color:var(--muted)}.small{font-size:12px;color:var(--muted)}.error{background:#fff4f4;border:1px solid #e1b0b0;color:#7a2424;border-radius:14px;padding:20px;margin-top:20px}
  </style>
</head>
<body>
<header>
  <div class="brand">Knowledge Hub Magazine</div>
  <div></div>
  <nav><a href="/">Home</a><a href="/wire">Wire</a><a href="/articles">Articles</a><a href="/library">Library</a></nav>
</header>
<main>
  <section>
    <div class="eyebrow">Wire</div>
    <h1>Signals, fragments, and source notes.</h1>
    <p class="deck">Short entries for tools, films, systems, images, and ideas before they become essays or library records.</p>
  </section>
  <section class="toolbar">
    <div class="toolbar-top">
      <div><div class="toolbar-title">Filter by tag</div><div id="filters" class="filter-row"></div></div>
      <input id="search" class="search" placeholder="Search Wire">
    </div>
    <div class="count"><span id="visibleCount">0</span> / <span id="totalCount">0</span> entries shown</div>
  </section>
  <section id="feed" class="feed"></section>
  <section id="empty" class="empty">No entries match this filter.</section>
</main>
<script>
let entries = [];
let activeTag = 'all';
const feed = document.getElementById('feed');
const filters = document.getElementById('filters');
const search = document.getElementById('search');
const visibleCount = document.getElementById('visibleCount');
const totalCount = document.getElementById('totalCount');
const empty = document.getElementById('empty');

function esc(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function normalizeUrl(value) { return String(value || '').replace(/\s+/g, ''); }

function extractEntriesFromHtml(html) {
  const match = html.match(/<script id="wire-data" type="application\/json">([\s\S]*?)<\/script>/);
  if (!match) throw new Error('wire-data block not found');
  const raw = match[1].trim().replace(/[\r\n\t]+/g, '');
  return JSON.parse(raw);
}
async function fetchText(url) {
  const response = await fetch(url, { cache: 'no-store' });
  if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
  return await response.text();
}
async function loadEntries() {
  const sources = [
    'https://raw.githubusercontent.com/OliverTaki/knowledgehub/main/public/wire.html?ts=' + Date.now(),
    '/wire.html?source=legacy-data&t=' + Date.now()
  ];
  const errors = [];
  for (const source of sources) {
    try {
      const html = await fetchText(source);
      const parsed = extractEntriesFromHtml(html);
      entries = parsed.map(entry => ({
        ...entry,
        url: normalizeUrl(entry.url),
        author: String(entry.author || '').replace(/\s+/g, ''),
        labels: Array.isArray(entry.labels) ? entry.labels : [],
        tags: Array.isArray(entry.tags) ? entry.tags : []
      }));
      if (entries.length > 0) return;
      errors.push(`${source}: parsed 0 entries`);
    } catch (error) {
      errors.push(`${source}: ${error.message}`);
    }
  }
  throw new Error(errors.join(' / '));
}
function tagCounts() {
  const counts = new Map();
  entries.forEach(entry => (entry.tags || []).forEach(tag => counts.set(tag, (counts.get(tag) || 0) + 1)));
  return Array.from(counts.entries()).sort((a,b) => b[1] - a[1] || a[0].localeCompare(b[0]));
}
function renderFilters() {
  const topTags = tagCounts().slice(0, 48);
  filters.innerHTML = `<button class="filter active" data-tag="all">All</button>` + topTags.map(([tag,count]) => `<button class="filter" data-tag="${esc(tag)}">${esc(tag)} <span class="small">${count}</span></button>`).join('');
  filters.querySelectorAll('.filter').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTag = btn.dataset.tag;
      filters.querySelectorAll('.filter').forEach(b => b.classList.toggle('active', b === btn));
      renderFeed();
    });
  });
}
function matches(entry) {
  const q = search.value.trim().toLowerCase();
  const tagOk = activeTag === 'all' || (entry.tags || []).includes(activeTag);
  if (!tagOk) return false;
  if (!q) return true;
  const haystack = [entry.title, entry.summary, entry.author, entry.posted, ...(entry.labels || []), ...(entry.tags || [])].join(' ').toLowerCase();
  return haystack.includes(q);
}
function renderCard(entry) {
  const labels = (entry.labels || []).map(label => `<span class="label">${esc(label)}</span>`).join('');
  const tags = (entry.tags || []).map(tag => `<button class="tag" data-tag="${esc(tag)}">${esc(tag)}</button>`).join('');
  return `<article class="card"><div class="meta">${labels}<span>Posted ${esc(entry.posted || 'unknown')}</span><span>${esc(entry.author || 'Unknown source')}</span></div><h2>${esc(entry.title || 'Source note')}</h2><p class="summary">${esc(entry.summary || 'Source note for later classification.')}</p><p><a href="${esc(entry.url)}" target="_blank" rel="noopener noreferrer">Source</a></p><div class="tag-row">${tags}</div></article>`;
}
function renderFeed() {
  const shown = entries.filter(matches);
  feed.innerHTML = shown.map(renderCard).join('');
  visibleCount.textContent = String(shown.length);
  totalCount.textContent = String(entries.length);
  empty.style.display = shown.length ? 'none' : 'block';
  feed.querySelectorAll('.tag').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTag = btn.dataset.tag;
      filters.querySelectorAll('.filter').forEach(b => b.classList.toggle('active', b.dataset.tag === activeTag));
      renderFeed();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
}
search.addEventListener('input', renderFeed);
loadEntries().then(() => { renderFilters(); renderFeed(); }).catch(error => {
  visibleCount.textContent = '0';
  totalCount.textContent = '0';
  feed.innerHTML = `<div class="error">Wire data failed to load: ${esc(error.message)}</div>`;
});
</script>
</body>
</html>
