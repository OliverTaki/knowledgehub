<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Wire — Knowledge Hub Magazine</title>
  <style>
    :root{--bg:#f7f7f5;--paper:#fff;--ink:#1f1f1f;--muted:#666;--line:#ddd;--error-bg:#fff4f4;--error-line:#e1b0b0;--error-ink:#7a2424}body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;background:var(--bg);color:var(--ink)}header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:18px 28px;background:var(--paper);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}.brand{font-weight:700;letter-spacing:-.02em}nav{justify-self:end;display:flex;gap:16px}nav a{color:#222;text-decoration:none}main{max-width:1120px;margin:0 auto;padding:44px 28px}.eyebrow{color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-size:12px}h1{font-size:clamp(38px,6vw,76px);letter-spacing:-.06em;line-height:.95;margin:10px 0 16px}.deck{max-width:780px;color:#444;font-size:19px;line-height:1.55}.toolbar{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px;margin:26px 0 22px}.toolbar-top{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}.toolbar-title{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px}.filter-row{display:flex;flex-wrap:wrap;gap:8px}.filter,.tag{display:inline-block;padding:4px 9px;border:1px solid var(--line);border-radius:999px;font-size:12px;color:#555;background:#fff;cursor:pointer}.filter:hover,.tag:hover,.filter.active{border-color:#222;color:#111}.search{width:min(420px,70vw);padding:10px 12px;border:1px solid #ccc;border-radius:999px}.count{color:var(--muted);font-size:13px;margin-top:10px}.feed{margin-top:20px}.card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:20px;margin-bottom:14px}.meta{color:var(--muted);font-size:13px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}.label{display:inline-block;padding:3px 8px;border:1px solid #d8d8d8;border-radius:999px;background:#f2f2ef;color:#555;font-size:12px}.summary{line-height:1.55}.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}a{color:#0756a5;text-decoration:none}.empty{display:none;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:20px;color:var(--muted)}.small{font-size:12px;color:var(--muted)}.error{background:var(--error-bg);border:1px solid var(--error-line);color:var(--error-ink);border-radius:14px;padding:20px;margin-top:20px}.status{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:20px;color:var(--muted)}.machine{font-size:12px;color:var(--muted);margin-top:10px;display:flex;gap:10px;flex-wrap:wrap}
  </style>
</head>
<body>
<header>
  <div class="brand">Knowledge Hub Magazine</div>
  <div></div>
  <nav><a href="/">Home</a><a href="/wire">Wire</a><a href="/articles">Articles</a><a href="/library">Library</a></nav>
</header>
<main>
  <section>
    <div class="eyebrow">Wire</div>
    <h1>Signals, fragments, and source notes.</h1>
    <p class="deck">Short entries for tools, films, systems, images, and ideas before they become essays or library records.</p>
  </section>
  <section class="toolbar">
    <div class="toolbar-top">
      <div><div class="toolbar-title">Filter by tag</div><div id="filters" class="filter-row"></div></div>
      <input id="search" class="search" placeholder="Search Wire">
    </div>
    <div class="count"><span id="visibleCount">0</span> / <span id="totalCount">0</span> entries shown</div>
    <div id="sourceInfo" class="machine"></div>
  </section>
  <section id="feed" class="feed"><div class="status">Loading Wire data…</div></section>
  <section id="empty" class="empty">No entries match this filter.</section>
</main>
<script>
let entries=[];let activeTag='all';
const feed=document.getElementById('feed'),filters=document.getElementById('filters'),search=document.getElementById('search'),visibleCount=document.getElementById('visibleCount'),totalCount=document.getElementById('totalCount'),empty=document.getElementById('empty'),sourceInfo=document.getElementById('sourceInfo');
function esc(value){return String(value??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));}
function normalizeList(value){return Array.isArray(value)?value.filter(Boolean).map(String):[];}
function normalizeEntry(entry,index){const labels=normalizeList(entry.labels);const tags=normalizeList(entry.tags);const contentKinds=normalizeList(entry.content_kinds);const domains=normalizeList(entry.domains);return{...entry,id:String(entry.id||'wire_'+(index+1)),url:String(entry.url||entry.original_url||''),author_handle:String(entry.author_handle||entry.author||''),posted_at:String(entry.posted_at||entry.posted||''),collected_at:String(entry.collected_at||entry.collected||''),labels,content_kinds:contentKinds.length?contentKinds:labels,domains,tags,title:String(entry.title||entry.summary||'Source note'),summary:String(entry.summary||entry.public_summary||entry.text||'Source note for later classification.')}}
function isBadJsonChar(raw,index){const code=raw.charCodeAt(index);return code<32||code===8232||code===8233;}
function sanitizeJsonText(raw){let out='';for(let i=0;i<raw.length;i+=1){out+=isBadJsonChar(raw,i)?' ':raw[i];}return out;}
function parsePossiblyBrokenJson(raw){try{return JSON.parse(raw.trim());}catch(first){return JSON.parse(sanitizeJsonText(raw.trim()));}}
function extractLegacyEntries(html){const match=html.match(/<script id=["']wire-data["'] type=["']application\/json["']>([\s\S]*?)<\/script>/);if(!match)throw new Error('legacy wire-data block not found');const parsed=parsePossiblyBrokenJson(match[1]);if(!Array.isArray(parsed)||parsed.length===0)throw new Error('legacy wire-data has 0 entries');return parsed;}
async function fetchJsonSource(){const response=await fetch('/wire.json?t='+Date.now(),{cache:'no-store'});if(!response.ok)throw new Error('/wire.json '+response.status);const data=await response.json();const parsed=Array.isArray(data)?data:data.entries;if(!Array.isArray(parsed)||parsed.length===0)throw new Error('/wire.json has 0 entries');sourceInfo.innerHTML='<span>Data: /wire.json</span><a href="/wire.json" target="_blank" rel="noopener">JSON</a><a href="/wire-debug" target="_blank" rel="noopener">Debug</a>';return parsed.map(normalizeEntry);}
async function fetchLegacyHtmlSource(){const response=await fetch('/wire.html?legacy_data=1&t='+Date.now(),{cache:'no-store'});if(!response.ok)throw new Error('/wire.html '+response.status);const html=await response.text();const parsed=extractLegacyEntries(html);sourceInfo.innerHTML='<span>Data: legacy /wire.html recovered in browser</span><a href="/wire-debug" target="_blank" rel="noopener">Debug</a>';return parsed.map(normalizeEntry);}
async function fetchGithubRawSource(){const response=await fetch('https://raw.githubusercontent.com/OliverTaki/knowledgehub/main/public/wire.html?t='+Date.now(),{cache:'no-store'});if(!response.ok)throw new Error('GitHub raw wire.html '+response.status);const html=await response.text();const parsed=extractLegacyEntries(html);sourceInfo.innerHTML='<span>Data: GitHub raw legacy wire.html recovered in browser</span><a href="https://github.com/OliverTaki/knowledgehub" target="_blank" rel="noopener">GitHub</a>';return parsed.map(normalizeEntry);}
async function loadEntries(){const errors=[];for(const loader of [fetchJsonSource,fetchLegacyHtmlSource,fetchGithubRawSource]){try{return await loader();}catch(error){errors.push(error.message);}}throw new Error(errors.join(' / '));}
function allTags(entry){return[...new Set([...normalizeList(entry.tags),...normalizeList(entry.content_kinds),...normalizeList(entry.domains),...normalizeList(entry.labels)])];}
function tagCounts(){const counts=new Map();entries.forEach(entry=>allTags(entry).forEach(tag=>counts.set(tag,(counts.get(tag)||0)+1)));return Array.from(counts.entries()).sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0]));}
function renderFilters(){const topTags=tagCounts().slice(0,64);filters.innerHTML='<button class="filter active" data-tag="all">All</button>'+topTags.map(([tag,count])=>'<button class="filter" data-tag="'+esc(tag)+'">'+esc(tag)+' <span class="small">'+count+'</span></button>').join('');filters.querySelectorAll('.filter').forEach(btn=>{btn.addEventListener('click',()=>{activeTag=btn.dataset.tag;filters.querySelectorAll('.filter').forEach(b=>b.classList.toggle('active',b===btn));renderFeed();});});}
function matches(entry){const q=search.value.trim().toLowerCase();const tags=allTags(entry);if(activeTag!=='all'&&!tags.includes(activeTag))return false;if(!q)return true;const haystack=[entry.title,entry.summary,entry.author_handle,entry.posted_at,entry.url,...tags,...normalizeList(entry.labels)].join(' ').toLowerCase();return haystack.includes(q);}
function renderCard(entry){const labels=(entry.labels.length?entry.labels:entry.content_kinds).map(label=>'<span class="label">'+esc(label)+'</span>').join('');const tags=allTags(entry).map(tag=>'<button class="tag" data-tag="'+esc(tag)+'">'+esc(tag)+'</button>').join('');return '<article class="card"><div class="meta">'+labels+'<span>Posted '+esc(entry.posted_at||'unknown')+'</span><span>'+esc(entry.author_handle||'Unknown source')+'</span></div><h2>'+esc(entry.title||'Source note')+'</h2><p class="summary">'+esc(entry.summary)+'</p><p><a href="'+esc(entry.url)+'" target="_blank" rel="noopener noreferrer">Source</a></p><div class="tag-row">'+tags+'</div></article>';}
function renderFeed(){const shown=entries.filter(matches);feed.innerHTML=shown.map(renderCard).join('');visibleCount.textContent=String(shown.length);totalCount.textContent=String(entries.length);empty.style.display=shown.length?'none':'block';feed.querySelectorAll('.tag').forEach(btn=>{btn.addEventListener('click',()=>{activeTag=btn.dataset.tag;filters.querySelectorAll('.filter').forEach(b=>b.classList.toggle('active',b.dataset.tag===activeTag));renderFeed();window.scrollTo({top:0,behavior:'smooth'});});});}
search.addEventListener('input',renderFeed);
loadEntries().then(loaded=>{entries=loaded;renderFilters();renderFeed();}).catch(error=>{visibleCount.textContent='0';totalCount.textContent='0';sourceInfo.innerHTML='<span>Data load failed</span><a href="/wire-debug" target="_blank" rel="noopener">Debug</a><a href="https://github.com/OliverTaki/knowledgehub" target="_blank" rel="noopener">GitHub</a>';feed.innerHTML='<div class="error">Wire data failed to load: '+esc(error.message)+'</div>';});
</script>
</body>
</html>
