name: Deploy Knowledge Hub

on:
  workflow_dispatch:
  schedule:
    - cron: "17 19 * * *"
  push:
    branches:
      - main

concurrency:
  group: deploy-knowledgehub
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site and AI-readable Wire artifacts
        run: npm run build

      - name: Verify Wire is not empty
        run: |
          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('public/wire.json','utf8')); if (!data.entries || data.entries.length === 0) { throw new Error('public/wire.json has 0 entries'); } console.log('Wire entries:', data.entries.length);"
          test -s public/wire.html
          test -s public/wire.md
          test -s public/wire.ndjson
          test -s public/llms.txt

      - name: Deploy to Cloudflare Workers
        if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Cloudflare deploy skipped
        if: ${{ secrets.CLOUDFLARE_API_TOKEN == '' || secrets.CLOUDFLARE_ACCOUNT_ID == '' }}
        run: echo "Cloudflare deploy skipped because Cloudflare secrets are not configured."
